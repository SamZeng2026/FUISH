<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>НЕФТЕГАЗ 2026 · FUI International</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: A4; margin: 0; }
    body {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans", sans-serif;
    }
    .poster {
      width: 210mm;
      height: 297mm;
      max-height: 297mm;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.2);
      position: relative;
      background: url('exhibition-poster-neftegaz.png') center/cover no-repeat;
    }
    .poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(165deg, rgba(10,30,55,.72) 0%, rgba(5,18,35,.78) 40%, rgba(0,0,0,.82) 100%);
    }
    .poster-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 24px 20px 24px;
      height: 100%;
      box-sizing: border-box;
      justify-content: space-between;
    }
    .poster-products { flex-shrink: 0; }
    .poster-brand {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: .5px;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .poster-product-list {
      list-style: none;
      font-size: 13px;
      line-height: 1.65;
      color: rgba(160,220,210,.94);
      font-style: italic;
      text-shadow: 0 1px 2px rgba(0,0,0,.35);
    }
    .poster-product-list li {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding-bottom: 3px;
      margin-bottom: 3px;
    }
    .poster-product-list li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .poster-photos { flex-shrink: 0; }
    .poster-photos img {
      width: 100%;
      height: auto;
      max-height: 95mm;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }
    .poster-event {
      flex-shrink: 0;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.15);
    }
    .poster-title {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: .4px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,.45);
      line-height: 1.2;
    }
    .poster-line {
      margin: 0;
      font-size: 14px;
      color: rgba(255,255,255,.92);
      line-height: 1.45;
      text-shadow: 0 1px 2px rgba(0,0,0,.4);
    }
    .poster-line .label { color: rgba(160,220,200,.98); font-weight: 700; margin-right: 6px; }
    .poster-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .3px;
      color: #fff;
      background: linear-gradient(180deg, rgba(255,106,0,.95), rgba(255,106,0,.75));
      border: 1px solid rgba(255,106,0,.55);
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 2px 10px rgba(255,106,0,.25);
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="poster-overlay"></div>
    <div class="poster-inner">
      <div class="poster-products">
        <div class="poster-brand">FUI™</div>
        <ul class="poster-product-list">
          <li>Глухой фланец</li>
          <li>Фланец под сварку в раструб</li>
          <li>Надвижной / свободный фланец</li>
          <li>Специальный фланец</li>
          <li>Лабиринтная клетка · Регулирующий клапан</li>
        </ul>
      </div>
      <div class="poster-photos">
        <img src="exhibition-products.png" alt="Клапаны, фланцы и фитинги"/>
      </div>
      <div class="poster-event">
        <h2 class="poster-title">📌 НЕФТЕГАЗ 2026</h2>
        <p class="poster-line"><span class="label">📍 Место</span> Москва (Крокус Экспо)</p>
        <p class="poster-line"><span class="label">🗓 Дата</span> 2 — 5 марта 2026</p>
        <span class="poster-cta">Связаться</span>
      </div>
    </div>
  </div>
</body>
</html>
